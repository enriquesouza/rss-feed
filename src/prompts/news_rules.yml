topic_groups:
  - id: "rust-rustsec"
    keywords: ["rustsec", "rust", "tokio", "wasmtime", "crates.io"]
    max_count: 3
    priority_bonus: 40
  - id: "smart-contract-security"
    keywords: ["openzeppelin", "solidity", "smart contract", "smart-contract", "trailofbits", "trail of bits", "audit", "mutation testing", "mewt", "muton"]
    max_count: 3
    priority_bonus: 40
  - id: "hacks-exploits"
    keywords: ["hack", "exploit", "seed phrase", "private key", "fake ledger", "bridge", "attacker", "drain", "breach", "malware", "phishing"]
    max_count: 4
    priority_bonus: 25
  - id: "stablecoins-payments"
    keywords: ["stablecoin", "usdc", "usdt", "rlusd", "circle", "payment rail", "yield-bearing"]
    max_count: 3
    priority_bonus: 25
  - id: "regulation-market-structure"
    keywords: ["sec ", "commission", "mica", "esma", "fca", "clarity act", "compliance", "lawmaker", "legislation"]
    max_count: 3
    priority_bonus: 20
  - id: "btc-corporate"
    keywords: ["microstrategy", "saylor", "metaplanet", "mara", "corporate treasury", "sovereign", "strategic reserve"]
    max_count: 3
    priority_bonus: 20
  - id: "ethereum-evm"
    keywords: ["layer 2", "l2", "rollup", "arbitrum", "optimism", "base", "blob", "eip", "vitalik"]
    max_count: 3
    priority_bonus: 40
  - id: "solana-infra"
    keywords: ["firedancer", "jito", "solana", "helius", "anza", "agave", "svm"]
    max_count: 3
    priority_bonus: 40
  - id: "macro-geopolitics"
    keywords: ["fomc", "interest rate", "powell", "fed ", "inflation", "cpi", "election", "geopolitics"]
    max_count: 3
    priority_bonus: 20
  - id: "ai-agents-security"
    keywords: ["ai agent", "carbium", "venice", "bittensor", "tao ", "zkml", "tee", "autonomous", "inference"]
    max_count: 3
    priority_bonus: 25
  - id: "general-market"
    keywords: []
    max_count: 2
    priority_bonus: 0

